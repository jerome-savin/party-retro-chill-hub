<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00f5ff;--magenta:#ff00cc;--deep:#07050f;--text:#e8eaff;--good:#00ff88}
body{min-height:100vh;background:var(--deep);color:var(--text);font-family:'Share Tech Mono',monospace;display:grid;place-items:center;padding:2rem;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.06) 1px,transparent 1px);background-size:55px 55px;pointer-events:none}
main{position:relative;z-index:1;text-align:center;max-width:760px}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(0,245,255,.65);margin-bottom:1rem}
h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(3rem,10vw,7rem);line-height:.9;text-transform:uppercase;color:#fff;text-shadow:0 0 24px rgba(0,255,136,.55),3px 3px 0 rgba(255,0,204,.45)}
p{margin:1rem auto 0;line-height:1.6;color:rgba(232,234,255,.78);font-size:1.1rem}
a{display:inline-flex;margin-top:2rem;min-height:2.8rem;align-items:center;justify-content:center;border:1px solid var(--cyan);padding:0 1.3rem;color:#fff;text-decoration:none;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:.08em;background:rgba(0,245,255,.08);box-shadow:0 0 18px rgba(0,245,255,.14)}
</style>

<main>
