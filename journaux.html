<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quelle est la vraie page de couverture ? - Party Retro Chill Hub</title>
<link rel="icon" type="image/png" href="assets/favicons/favicon-prch.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00f5ff;--magenta:#ff00cc;--orange:#ff8c00;--yellow:#ffe600;--deep:#07050f;--text:#e8eaff;--bad:#ff365e;--good:#00ff88}
body{min-height:100vh;background:var(--deep);color:var(--text);font-family:'Share Tech Mono',monospace;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.06) 1px,transparent 1px);background-size:55px 55px;z-index:0;pointer-events:none}
.bg-scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);pointer-events:none;z-index:100}
.glow-a,.glow-b{position:fixed;border-radius:50%;filter:blur(2px);pointer-events:none;z-index:0}
.glow-a{top:-140px;right:-120px;width:520px;height:520px;background:radial-gradient(circle,rgba(255,0,204,.18),transparent 66%)}
.glow-b{bottom:-160px;left:-120px;width:560px;height:560px;background:radial-gradient(circle,rgba(0,245,255,.12),transparent 66%)}
.page{position:relative;z-index:1;width:min(1180px,100%);margin:0 auto;padding:3rem 1.25rem 4rem}
.header{text-align:center;margin:0 auto 2rem;max-width:820px}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(0,245,255,.65);margin-bottom:.8rem}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(2.8rem,8vw,6rem);line-height:.9;text-transform:uppercase;color:#fff;text-shadow:0 0 24px rgba(0,245,255,.55),3px 3px 0 rgba(255,0,204,.45);letter-spacing:0}
.intro{margin:1rem auto 0;font-size:clamp(.95rem,2vw,1.15rem);line-height:1.55;color:rgba(232,234,255,.78);max-width:680px}
.penalty{min-height:3.6rem;margin:1.6rem auto 1.8rem;display:flex;align-items:center;justify-content:center;text-align:center}
.penalty-panel{display:inline-flex;align-items:center;gap:.7rem;border:1px solid rgba(0,245,255,.25);background:rgba(0,245,255,.05);padding:.8rem 1rem;color:rgba(232,234,255,.82);box-shadow:0 0 24px rgba(0,245,255,.08)}
.penalty-panel.is-active{border-color:rgba(255,54,94,.75);background:rgba(255,54,94,.08);color:#fff;box-shadow:0 0 24px rgba(255,54,94,.18)}
.penalty-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,234,255,.55)}
.penalty-time{font-family:'Orbitron',sans-serif;font-weight:900;color:var(--yellow);text-shadow:0 0 12px rgba(255,230,0,.7)}
.poster-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1.2rem}
.poster-card{display:flex;flex-direction:column;gap:.8rem;min-width:0}
.poster-frame{position:relative;aspect-ratio:900/1270;background:#111;border:1px solid rgba(0,245,255,.25);box-shadow:0 0 24px rgba(0,245,255,.08);overflow:hidden;cursor:zoom-in}
.poster-frame::before{content:attr(data-label);position:absolute;top:.55rem;left:.55rem;z-index:1;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,245,255,.72);background:rgba(7,5,15,.82);border:1px solid rgba(0,245,255,.25);padding:.35rem .45rem}
.poster-frame img{display:block;width:100%;height:100%;object-fit:cover}
.poster-frame:focus-visible{outline:2px solid var(--cyan);outline-offset:4px}
.choice{width:100%;min-height:2.8rem;border:1px solid var(--magenta);background:rgba(255,0,204,.08);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.05rem;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;text-shadow:0 0 10px rgba(255,0,204,.7);box-shadow:0 0 18px rgba(255,0,204,.14);transition:transform .15s ease,border-color .15s ease,background .15s ease}
.choice:hover:not(:disabled),.choice:focus-visible:not(:disabled){transform:translateY(-1px);border-color:var(--cyan);background:rgba(0,245,255,.09);outline:none}
.choice:disabled{cursor:not-allowed;opacity:.42}
.choice.is-wrong{border-color:var(--bad);background:rgba(255,54,94,.16)}
.choice.is-right{border-color:var(--good);background:rgba(0,255,136,.16)}
.lightbox{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:1.25rem;background:rgba(7,5,15,.88);backdrop-filter:blur(10px)}
.lightbox.is-open{display:flex}
.lightbox-image{display:block;max-width:min(92vw,980px);max-height:88vh;object-fit:contain;border:1px solid rgba(0,245,255,.35);box-shadow:0 0 34px rgba(0,245,255,.18)}
.lightbox-close{position:fixed;top:1rem;right:1rem;width:2.7rem;height:2.7rem;border:1px solid rgba(0,245,255,.45);background:rgba(7,5,15,.9);color:#fff;font-family:'Orbitron',sans-serif;font-size:1.2rem;cursor:pointer;box-shadow:0 0 18px rgba(0,245,255,.18)}
.lightbox-close:hover,.lightbox-close:focus-visible{border-color:var(--magenta);outline:none}
@media (max-width:900px){.poster-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.page{padding-top:2rem}}
@media (max-width:540px){.poster-grid{grid-template-columns:1fr}.penalty-panel{width:100%;justify-content:center;flex-wrap:wrap}.poster-card{max-width:360px;margin:0 auto}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="glow-a"></div>
<div class="glow-b"></div>

<main class="page">
  <header class="header">
    <div class="eyebrow">PRCH // Défi observation</div>
    <h1>Quelle est la vraie page de couverture ?</h1>
    <p class="intro">Examinez attentivement les quatre pages de couverture. Ne vous fiez pas à l'insolite. Trois sont fausses, une seule est vraie.</p>
  </header>

  <section class="penalty" aria-live="polite" aria-atomic="true">
    <div class="penalty-panel" id="penalty-panel">
      <span class="penalty-label">Pénalité</span>
      <span id="penalty-message">Aucune pénalité en cours</span>
      <span class="penalty-time" id="penalty-time"></span>
    </div>
  </section>

  <section class="poster-grid" aria-label="Affiches de journal à examiner">
    <article class="poster-card">
      <div class="poster-frame" data-label="Affiche 01" role="button" tabindex="0" aria-label="Ouvrir l'affiche 1 en grand">
        <img src="assets/posters/journal-1.jpg" alt="Affiche de journal numéro 1"/>
      </div>
      <button class="choice" type="button" data-poster="1">C'est la vraie</button>
    </article>

    <article class="poster-card">
      <div class="poster-frame" data-label="Affiche 02" role="button" tabindex="0" aria-label="Ouvrir l'affiche 2 en grand">
        <img src="assets/posters/journal-2.jpg" alt="Affiche de journal numéro 2"/>
      </div>
      <button class="choice" type="button" data-poster="2">C'est la vraie</button>
    </article>

    <article class="poster-card">
      <div class="poster-frame" data-label="Affiche 03" role="button" tabindex="0" aria-label="Ouvrir l'affiche 3 en grand">
        <img src="assets/posters/journal-3.jpg" alt="Affiche de journal numéro 3"/>
      </div>
      <button class="choice" type="button" data-poster="3" data-correct="true">C'est la vraie</button>
    </article>

    <article class="poster-card">
      <div class="poster-frame" data-label="Affiche 04" role="button" tabindex="0" aria-label="Ouvrir l'affiche 4 en grand">
        <img src="assets/posters/journal-4.jpg" alt="Affiche de journal numéro 4"/>
      </div>
      <button class="choice" type="button" data-poster="4">C'est la vraie</button>
    </article>
  </section>
</main>

<div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Affiche agrandie">
  <button class="lightbox-close" type="button" id="lightbox-close" aria-label="Fermer l'affiche agrandie">×</button>
  <img class="lightbox-image" id="lightbox-image" src="" alt=""/>
</div>

<script>
const penaltyDuration = 60;
const solutionUrl = 'solution.html';
const buttons = Array.from(document.querySelectorAll('.choice'));
const posterFrames = Array.from(document.querySelectorAll('.poster-frame'));
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightbox-image');
const lightboxClose = document.getElementById('lightbox-close');
const panel = document.getElementById('penalty-panel');
const message = document.getElementById('penalty-message');
const time = document.getElementById('penalty-time');
let penaltyRemaining = 0;
let penaltyTimer = null;
let lastPosterFocus = null;

function formatTime(seconds){
  return `00:${String(seconds).padStart(2,'0')}`;
}

function setLocked(locked){
  buttons.forEach((button) => {
    button.disabled = locked;
  });
}

function clearButtonStates(){
  buttons.forEach((button) => {
    button.classList.remove('is-wrong','is-right');
  });
}

function openLightbox(frame){
  const image = frame.querySelector('img');
  lastPosterFocus = frame;
  lightboxImage.src = image.src;
  lightboxImage.alt = image.alt;
  lightbox.classList.add('is-open');
  lightbox.setAttribute('aria-hidden','false');
  lightboxClose.focus();
}

function closeLightbox(){
  lightbox.classList.remove('is-open');
  lightbox.setAttribute('aria-hidden','true');
  lightboxImage.src = '';
  lightboxImage.alt = '';

  if(lastPosterFocus){
    lastPosterFocus.focus();
  }
}

function startPenalty(button){
  penaltyRemaining = penaltyDuration;
  button.classList.add('is-wrong');
  panel.classList.add('is-active');
  message.textContent = 'Mauvaise affiche. Attendez avant de retenter.';
  time.textContent = formatTime(penaltyRemaining);
  setLocked(true);

  penaltyTimer = setInterval(() => {
    penaltyRemaining -= 1;
    time.textContent = formatTime(penaltyRemaining);

    if(penaltyRemaining <= 0){
      clearInterval(penaltyTimer);
      penaltyTimer = null;
      penaltyRemaining = 0;
      panel.classList.remove('is-active');
      message.textContent = 'Aucune pénalité en cours';
      time.textContent = '';
      clearButtonStates();
      setLocked(false);
    }
  }, 1000);
}

buttons.forEach((button) => {
  button.addEventListener('click', () => {
    if(penaltyRemaining > 0){
      return;
    }

    clearButtonStates();

    if(button.dataset.correct === 'true'){
      button.classList.add('is-right');
      setLocked(true);
      message.textContent = 'Bonne affiche. Ouverture de la solution...';
      time.textContent = '';
      window.setTimeout(() => {
        window.location.href = solutionUrl;
      }, 600);
      return;
    }

    startPenalty(button);
  });
});

posterFrames.forEach((frame) => {
  frame.addEventListener('click', () => openLightbox(frame));
  frame.addEventListener('keydown', (event) => {
    if(event.key === 'Enter' || event.key === ' '){
      event.preventDefault();
      openLightbox(frame);
    }
  });
});

lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (event) => {
  if(event.target === lightbox){
    closeLightbox();
  }
});
document.addEventListener('keydown', (event) => {
  if(event.key === 'Escape' && lightbox.classList.contains('is-open')){
    closeLightbox();
  }
});
</script>
</body>
</html>
